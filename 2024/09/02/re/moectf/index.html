    <div class="post-body" itemprop="articleBody"><h1 id="xtea"><a href="#xtea" class="headerlink" title="xtea"></a>xtea</h1><p><img src="/2024/09/02/re/moectf/J6N05NDWM17IEHEPGUFN%7D4G.png" alt="J6N05NDWM17IEHEPGUFN}4G"></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">通过分析我们看出这是两个tea加密,只要两次tea即可解出</span><br></pre></td></tr></table></figure>

<p><img src="/2024/09/02/re/moectf/J%7DR_E%7D0DBU5PB%25SHRYUUF_2.png" alt="J}R_E}0DBU5PB%SHRYUUF_2"></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">看tea里面,这个逆向很简单</span><br><span class="line">    v5 = *a3;</span><br><span class="line">	v6 = a3[1];</span><br><span class="line">	delta = (( - 855655493)) * 32;</span><br><span class="line">	for (unsigned int i = 0; i &lt; round; i++)</span><br><span class="line">	&#123;</span><br><span class="line">		v6 -= ((key[(delta &gt;&gt; 11) &amp; 3]) + delta) ^ (v5 + ((v5 &gt;&gt; 5) ^ (16 * v5)));</span><br><span class="line">		delta += 855655493;</span><br><span class="line">		v5 -= (key[(delta &amp; 3)] + delta) ^ (v6 + ((v6 &gt;&gt; 5) ^ (16 * v6)));</span><br><span class="line">	&#125;</span><br><span class="line">	*a3 = v5;</span><br><span class="line">	a3[1] = v6;</span><br></pre></td></tr></table></figure>

<p><img src="/2024/09/02/re/moectf/image-20240902213431593.png" alt="image-20240902213431593"></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">通过判断语句,找到加密后的flag,注意是小端序存储,也就是0x269669a3 3d0b78bd 6228a59d</span><br><span class="line">小技巧:选中这里点击shift+e更快复制</span><br></pre></td></tr></table></figure>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">解密代码如下:</span><br><span class="line">#include &lt;stdint.h&gt;</span><br><span class="line">int main()</span><br><span class="line">&#123;</span><br><span class="line">    int  flag[3];</span><br><span class="line">	unsigned int key[4] = &#123; 2,0,2,4 &#125;;</span><br><span class="line"></span><br><span class="line">	flag[0] = 0x269669a3;</span><br><span class="line">	flag[1] = 0x3D0b78bd;</span><br><span class="line">	flag[2] = 0x6228a59d;</span><br><span class="line"></span><br><span class="line">    int  a2[2];</span><br><span class="line">	a2[0] = 0x3d0b78bd;</span><br><span class="line">	a2[1] = 0x6228a59d;</span><br><span class="line"></span><br><span class="line">	//第二次逆向</span><br><span class="line">	unsigned int  v5 = *a2;</span><br><span class="line">	unsigned int v6 = a2[1];</span><br><span class="line">    unsigned int  delta =  - 855655493 * 32;</span><br><span class="line">	unsigned int round = 32;</span><br><span class="line">	for (unsigned int i = 0; i &lt; round; i++)</span><br><span class="line">	&#123;</span><br><span class="line">		v6 -= ((key[(delta &gt;&gt; 11) &amp; 3]) + delta) ^ (v5 + ((v5 &gt;&gt; 5) ^ (16 * v5)));</span><br><span class="line">		delta += 855655493;</span><br><span class="line">		v5 -= ((key [(delta &amp; 3)]) + delta) ^ (v6 + ((v6 &gt;&gt; 5) ^ (16 * v6)));</span><br><span class="line">	&#125;</span><br><span class="line">	*a2 = v5;</span><br><span class="line">	a2[1] = v6;</span><br><span class="line">	flag[1] = a2[0];</span><br><span class="line">	flag[2] = a2[1];</span><br><span class="line">	for (int i = 0; i &lt;2; i++)</span><br><span class="line">	&#123;</span><br><span class="line">		printf(&quot;%x&quot;, a2[i]);</span><br><span class="line">	&#125;</span><br><span class="line">	printf(&quot;\n&quot;);</span><br><span class="line"></span><br><span class="line">	int  a3[2];</span><br><span class="line">	a3[0] = 0x269669a3;</span><br><span class="line">	a3[1] = 0x60c0d6e0;</span><br><span class="line">	//第一次逆向</span><br><span class="line">    v5 = *a3;</span><br><span class="line">	v6 = a3[1];</span><br><span class="line">	delta = (( - 855655493)) * 32;</span><br><span class="line">	for (unsigned int i = 0; i &lt; round; i++)</span><br><span class="line">	&#123;</span><br><span class="line">		v6 -= ((key[(delta &gt;&gt; 11) &amp; 3]) + delta) ^ (v5 + ((v5 &gt;&gt; 5) ^ (16 * v5)));</span><br><span class="line">		delta += 855655493;</span><br><span class="line">		v5 -= (key[(delta &amp; 3)] + delta) ^ (v6 + ((v6 &gt;&gt; 5) ^ (16 * v6)));</span><br><span class="line">	&#125;</span><br><span class="line">	*a3 = v5;</span><br><span class="line">	a3[1] = v6;</span><br><span class="line">	flag[0] = a3[0];</span><br><span class="line">	flag[1] = a3[1];</span><br><span class="line">	for (int i = 0; i &lt; 3; i++)</span><br><span class="line">	&#123;</span><br><span class="line">		printf(&quot;%x&quot;,flag[i]);</span><br><span class="line">	&#125;</span><br><span class="line">	printf(&quot;\n&quot;);</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
